name: Monthly Vahan Scrape

on:
  schedule:
    - cron: '0 0 5 * *' # 00:00 on the 5th of every month
  workflow_dispatch: # Allow manual trigger

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Playwright browsers
        run: playwright install chromium

      - name: Run Scraper
        run: |
          CURRENT_YEAR=$(date +'%Y')
          echo "Scraping data for year: $CURRENT_YEAR"
          python scraping/vahan_scraper.py --year $CURRENT_YEAR

      - name: Commit and push changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Auto-update Vahan data for $(date +'%Y-%m')"
          file_pattern: 'data/*.csv'
