name: Deploy Vahan MCP

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to Digital Ocean
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.DO_HOST }}
          username: root
          key: ${{ secrets.DO_SSH_KEY }}
          script: |
            if [ ! -d "/root/vahandata" ]; then
              git clone https://github.com/shubhamgrg04/vahanmcp.git /root/vahandata
            fi
            chmod +x /root/vahandata/scripts/deploy.sh
            /root/vahandata/scripts/deploy.sh
